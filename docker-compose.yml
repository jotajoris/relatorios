services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: usinas-backend
    restart: unless-stopped
    environment:
      - MONGO_URL=${MONGO_URL}
      - JWT_SECRET=${JWT_SECRET}
      - GROWATT_USER=${GROWATT_USER}
      - GROWATT_PASS=${GROWATT_PASS}
    networks:
      - app-network
    expose:
      - "8000"

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: usinas-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
